# .github/workflows/release.yaml

# (c) by Ralph Roth, ROSE SWE
# This GitHub Actions workflow builds and releases static binaries for the getrpm and listprodids tools.
# It triggers on pushes to version tags (e.g., v1.26) and creates ZIP packages for each platform, which are then uploaded as release assets.
# The workflow includes support for multiple platforms (Linux, Windows, macOS) and architectures (amd64, i386, arm64, ppc64le, s390x).
# The binaries are built with Go 1.25, and UPX is used to compress the executables for size reduction.
# The resulting ZIP files are named according to the platform and architecture (e.g., getrpm-linux-amd64.zip) and uploaded to the GitHub release associated with the tag.

name: getrpm - Release Static Binaries

on:
  push:
    tags:
      - 'v[0-9]+*' # Trigger on version tags (e.g., v1.26, v1.27.2 [was the first successful release], v1.28.0, etc.)
      - '[0-9]+.[0-9]+.[0-9]+*'     # Standard versioning tags

# THIS IS THE KEY FIX: Grant write permissions for releases
permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    # --- VARIABLE DEFINITIONS ---
    env:
      SRC_GETRPM: getrpm.go
      SRC_LISTPRODIDS: listprodids.go
      # The target ZIP filename using matrix context
      ZIP_FILENAME: getrpm-${{ matrix.goos }}-${{ matrix.goarch }}.zip

    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, binary_extension: "" }
          - { goos: linux, goarch: "386",  binary_extension: "" } # i386 Platform
          - { goos: linux, goarch: arm64, binary_extension: "" }  # Raspberry Pi 3+
          - { goos: linux, goarch: ppc64le, binary_extension: "" }
          - { goos: linux, goarch: s390x, binary_extension: "" }
          - { goos: windows, goarch: amd64, binary_extension: ".exe" }
          - { goos: windows, goarch: "386",  binary_extension: ".exe" }
          - { goos: darwin, goarch: amd64, binary_extension: "" }
          - { goos: darwin, goarch: arm64, binary_extension: "" }

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          # Disable automatic caching since you don't have a go.sum file yet
          cache: false

      - name: Install UPX
        # install UPX for compressing binaries, with error handling to continue even if installation fails (e.g., due to unsupported platforms)
        # WARNING: Old version 4.x - may not support all platforms, and may have not the best compression
        run: sudo apt-get update && sudo apt-get install -y upx

      - name: Build Static Binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0  # Ensures the resulting binary is a static executable
        run: |
          # Generate current date for the compileDate variable used in source
          COMPILE_DATE=$(date +%d.%m.%Y)
          mkdir -p dist

          # Build listprodids with requested ldflags
          # Build getrpm using source variable
          go build -ldflags "-s -w -X main.compileDate=${COMPILE_DATE}" \
            -o dist/getrpm-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_extension }} ${{ env.SRC_GETRPM }}

          # Build listprodids using source variable
          go build -ldflags "-s -w -X main.compileDate=${COMPILE_DATE}" \
            -o dist/listprodids-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_extension }} ${{ env.SRC_LISTPRODIDS }}

      - name: Compress with UPX
      # UPX packing for size reduction, with error handling to continue even if UPX fails (e.g., due to unsupported formats)
        run: |
          upx --best --lzma dist/getrpm-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_extension }} || true
          upx --best --lzma dist/listprodids-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.binary_extension }} || true

      - name: Create ZIP Package
        run: |
          cd dist
          #zip ../getrpm-${{ matrix.goos }}-${{ matrix.goarch }}.zip *
          # Use ZIP variable for the output file
          zip ../${{ env.ZIP_FILENAME }} *

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          #files: getrpm-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          # Use ZIP variable for the upload path
          files: ${{ env.ZIP_FILENAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
